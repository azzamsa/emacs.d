name: CI

on: [push, pull_request]

jobs:

  code_quality:
    name: Code quality
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: false
          cache: true

      # Install required tools
      - uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # v1.20.1
      - run: mise install cargo:dprint cargo:typos-cli #  via binstall

      - name: Quality Check
        run: |
          mise check

  msv:
    name: Minimum supported version
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        path: .emacs.d
        persist-credentials: false

    - uses: purcell/setup-emacs@bdc64dc730ae1fcba200bfd52cb1b4cf6159cbe5 # v8.0
      with:
        version: 30.2

    - name: Check emacs version
      run: emacs --version

    - name: Test the config
      run: emacs --batch
