name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  changelog:
    name: Generate changelog
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # required for git-cliff
          persist-credentials: false

      - name: Generate a changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        id: git-cliff
        with:
          config: .cliff.toml
          args: -vv --strip header --latest --no-exec --github-repo ${{ github.repository }}

  release:
    name: Release
    needs: changelog
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    environment: release
    steps:

      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set the release version
        shell: bash
        run: echo "RELEASE_VERSION=${GITHUB_REF:10}" >> "$GITHUB_ENV"

      - name: Show release version
        shell: bash
        run: echo "$RELEASE_VERSION"

      - name: Create tarball
        id: package
        shell: bash
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          PKG_SUFFIX=".tar.gz"
          PKG_BASENAME="${REPO_NAME}-${RELEASE_VERSION}"
          PKG_NAME="${PKG_BASENAME}${PKG_SUFFIX}"
          PKG_STAGING="/tmp/package"
          ARCHIVE_DIR="${PKG_STAGING}/${PKG_BASENAME}"
          mkdir -p "${ARCHIVE_DIR}"
          # Copy everything except .git to avoid bloating the archive
          rsync -a --exclude='.git' . "${ARCHIVE_DIR}/"
          pushd "${PKG_STAGING}/" >/dev/null
          tar czf "${PKG_NAME}" "${PKG_BASENAME}/"
          popd >/dev/null
          echo "PKG_NAME=${PKG_NAME}" >> "$GITHUB_OUTPUT"
          echo "PKG_PATH=${PKG_STAGING}/${PKG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set prerelease flag
        shell: bash
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          if [[ "$GIT_REF" == *alpha* ]] || [[ "$GIT_REF" == *beta* ]]; then
            echo "PRERELEASE_FLAG=--prerelease" >> "$GITHUB_ENV"
          else
            echo "PRERELEASE_FLAG=" >> "$GITHUB_ENV"
          fi

      - name: Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PKG_PATH: ${{ steps.package.outputs.PKG_PATH }}
          CHANGELOG: ${{ needs.changelog.outputs.release_body }}
        run: |
          set -euo pipefail

          RELEASE_ARGS=()
          [[ -n "${PRERELEASE_FLAG:-}" ]] && RELEASE_ARGS+=("$PRERELEASE_FLAG")

          CHANGELOG_FILE="$(mktemp)"
          printf "%s\n" "$CHANGELOG" > "$CHANGELOG_FILE"

          gh release create "$RELEASE_VERSION" \
            "$PKG_PATH" \
            --title "$RELEASE_VERSION" \
            --notes-file "$CHANGELOG_FILE" \
            "${RELEASE_ARGS[@]}"
