name: Release

on:
  push:
    tags:
      - "v*"

# Deny by default; each job opts into only what it needs.
permissions: {}

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # required for git-cliff
          persist-credentials: false

      - name: Generate a changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        id: git-cliff
        with:
          config: .cliff.toml
          args: -vv --strip header --latest --no-exec --github-repo ${{ github.repository }}

  # Create the GitHub release exactly once, before any assets are uploaded.
  # This is the gated step (environment: release) and the only place the
  # release is created, which avoids the 6-way `gh release create` collision.
  create-release:
    name: Create Release
    runs-on: ubuntu-24.04
    needs: changelog
    permissions:
      contents: write
    environment: release
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set the release version
        shell: bash
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG: ${{ needs.changelog.outputs.release_body }}
        run: .mise/tasks/github-release

  release:
    name: Release ${{ matrix.build }}
    runs-on: ubuntu-24.04
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false

    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set the release version
        shell: bash
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"

      - name: Create archive
        id: package
        shell: bash
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: .mise/tasks/package

      - name: Upload release asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG_PATH: ${{ steps.package.outputs.PKG_PATH }}
        run: gh release upload "$RELEASE_VERSION" "$PKG_PATH" --clobber
